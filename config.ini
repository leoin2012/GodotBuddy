; ============================================================
; GodotBuddy 配置文件
; 说明：Godot GDScript 项目分析助手配置
; ============================================================

[General]
; 工具版本
version = 1.0
; 报告输出目录（留空则使用默认 Reports/）
reports_base_dir =
; 项目扫描缓存目录（留空则使用默认 Cache/）
cache_base_dir =

[Analysis]
; ============================================================
; Knot CLI 配置（AI 分析引擎）
; ============================================================
; CLI 工具命令名称
cli_tool_command = knot-cli

; CLI 工具执行指令模板（支持占位符）
; 可用占位符:
;   {prompt_file}        - 分析 prompt 文件路径
;   {report_path}        - 报告输出路径
;   {cli_tool_workspace} - CLI 工作目录（Godot 项目根目录）
;   {cli_tool_model}     - AI 模型名
;   {cli_tool_user_rules} - 用户规则文件路径
;   {godotbuddy_dir}     - GodotBuddy 工具自身所在目录
;   {project_dir}        - 被分析的 Godot 项目目录
cli_tool_args_template = chat -w "{project_dir}" -w "{godotbuddy_dir}" --codebase --model "{cli_tool_model}" --user-rules "{cli_tool_user_rules}" -p "Read file {prompt_file} for complete Godot project analysis context and instructions. Analyze the project and write the complete Markdown analysis report to: {report_path}"

; CLI 工作目录（Godot 项目源码根目录，供 CLI 工具分析时使用）
cli_tool_workspace =

; CLI 使用的 AI 模型
cli_tool_model = claude-4.6-opus

; CLI 用户规则文件路径（如 GodotBuddy Skill 的 SKILL.md）
cli_tool_user_rules =

; CLI 工具执行超时时间（秒）
cli_tool_timeout = 1800

; ============================================================
; Knot CLI 团队密钥配置（可选，用于自动安装/更新 knot-cli）
; ============================================================
knot_team_token =
knot_cli_version =

; ============================================================
; AI 分析通用配置
; ============================================================

; AI 分析模式
; 可选值：
;   agent  - 多轮工具调用模式（默认）：AI 通过 Read/grep/find 等工具自主搜索源码
;   direct - 单次请求模式：预读取项目结构嵌入 prompt，一次请求完成分析
analysis_mode = agent

; 最大输入 Token 数
max_input_tokens = 70000

; 批量分析时的最大并发进程数
max_concurrent = 3

; ============================================================
; Godot 项目扫描配置
; ============================================================

[Scanner]
; 扫描时忽略的目录（逗号分隔）
ignore_dirs = .godot, .import, addons, build, export, android, ios

; 扫描的文件类型（逗号分隔）
scan_extensions = .gd, .tscn, .tres, .gdshader, .cfg, .import

; GDScript 文件最大行数限制（超过此行数的文件在 direct 模式下会被截断）
max_script_lines = 500

; 场景文件是否解析节点树
parse_scene_tree = true

; ============================================================
; 项目配置
; 每个项目一个独立的 section，格式为 [Project:项目名]
; ============================================================

[Project:ThirdPersonShooter-TPS-Demo]
; Godot 项目根目录（包含 project.godot 的目录）
project_dir = D:\Project\Godot\ThirdPersonShooter(tps)Demo
; Godot 引擎版本（留空则自动从 project.godot 检测）
engine_version =
; 项目描述（留空则自动从 project.godot 读取）
description =
; 分析重点（可选：architecture, performance, code_quality, security, all）
analysis_focus = all

; ============================================================
; Godot 引擎源码分析配置（SourceAnalyzer）
; 用于分析 Godot 引擎自身 C++ 源码，生成面向 UE 开发者的深度报告
; ============================================================

[SourceAnalyzer]
; Godot 引擎源码根目录（包含 core/, scene/, servers/ 等目录）
godot_source_dir =

; LLM 后端类型: openai / anthropic / custom (OpenAI兼容接口)
llm_backend = openai

; API Key（留空则从环境变量 OPENAI_API_KEY 或 ANTHROPIC_API_KEY 读取）
api_key =

; API Base URL（自定义 OpenAI 兼容接口地址，如 Ollama/vLLM/LM Studio）
base_url =

; 模型名称
model = gpt-4o

; LLM 温度参数 (0-1，越低越确定性)
temperature = 0.3

; 输出目录（源码分析报告存放位置，相对于 GodotBuddy 根目录）
output_dir = SourceAnalyzerOutput

; 要分析的模块 ID（逗号分隔，留空则全量分析 24 个模块）
; 例如: 02_object_system,06_rendering_server,13_script_system
modules =

; 每个模块最大分析文件数
max_files_per_module = 25

; 每个文件最大 token 数
max_file_tokens = 8000

; 是否仅扫描不分析（快速验证源码路径和分类是否正确）
scan_only = false
