; ============================================================
; GodotBuddy 配置文件
; 说明：统一使用 knot-cli 作为 AI 分析引擎
; ============================================================

[General]
; 工具版本
version = 2.0
; 报告输出目录（留空则使用默认 Reports/）
reports_base_dir =
; 项目扫描缓存目录（留空则使用默认 Cache/）
cache_base_dir =

; ============================================================
; Knot CLI 配置（统一 AI 分析引擎，项目分析和源码分析共用）
; ============================================================
[KnotCLI]
; CLI 工具命令名称
command = knot-cli

; AI 模型
model = claude-4.6-opus

; 用户规则文件路径（如 GodotBuddy Skill 的 SKILL.md）
user_rules =

; CLI 工具执行超时时间（秒）
timeout = 3600

; 团队密钥（可选，用于自动安装/更新 knot-cli）
team_token =

; 指定 knot-cli 版本（可选）
cli_version =

; ============================================================
; 项目分析配置（GDScript 游戏项目）
; ============================================================
[ProjectAnalysis]
; Prompt 模板文件（相对于 GodotBuddy 根目录，支持占位符）
prompt_file = Prompt/project_analysis_prompt.md

; knot-cli 执行指令模板（支持占位符）
; 可用占位符:
;   {prompt_file}    - 分析 prompt 文件路径
;   {report_path}    - 报告输出路径
;   {project_dir}    - 被分析的 Godot 项目目录
;   {godotbuddy_dir} - GodotBuddy 工具自身所在目录
;   {model}          - AI 模型名
;   {user_rules}     - 用户规则文件路径
cli_args_template = chat -w "{project_dir}" -w "{godotbuddy_dir}" --codebase --model "{model}" --user-rules "{user_rules}" -p "Read file {prompt_file} for complete Godot project analysis context and instructions. Analyze the project and write the complete Markdown analysis report to: {report_path}"

; 批量分析时的最大并发进程数
max_concurrent = 3

; ============================================================
; 源码分析配置（Godot 引擎 C++ 源码）
; ============================================================
[SourceAnalysis]
; Prompt 模板文件（相对于 GodotBuddy 根目录，支持占位符）
prompt_file = Prompt/source_analysis_prompt.md

; Godot 4.6.2 引擎源码目录
godot_source_dir = D:\Project\Godot\GodotEngine

; UE 4.26 引擎源码目录（可选，配置后启用 Godot vs UE 交叉对比分析模式）
ue_source_dir = D:\Project\CrashBuddy_UAMO_0608\UnrealEngine

; 报告输出目录（相对于 GodotBuddy 根目录）
output_dir = Reports/GodotEngine

; knot-cli 执行指令模板（支持占位符）
; 可用占位符:
;   {prompt_file}    - 分析 prompt 文件路径
;   {report_path}    - 报告输出路径
;   {source_dir}     - Godot 引擎源码目录
;   {ue_source_dir}  - UE 引擎源码目录（可选，用于交叉对比）
;   {godotbuddy_dir} - GodotBuddy 工具自身所在目录
;   {model}          - AI 模型名
;   {user_rules}     - 用户规则文件路径
cli_args_template = chat -w "{source_dir}" -w "{ue_source_dir}" -w "{godotbuddy_dir}" --codebase --model "{model}" --user-rules "{user_rules}" -p "Read file {prompt_file} for complete Godot engine source code analysis context and instructions. Analyze the module and write the complete Markdown analysis report to: {report_path}"

; 要分析的模块 ID（逗号分隔，留空则全量分析 24 个模块）
; 例如: 02_object_system,06_rendering_server,13_script_system
modules =

; 是否强制重新分析已有报告的模块（默认 false，跳过已有报告）
; 设为 true 则忽略已有报告，全部重新分析
force_rerun = false

; 每个模块最大分析文件数
max_files_per_module = 40

; 每个文件最大 token 数（构建 prompt 时截断用）
max_file_tokens = 8000

; ============================================================
; 技术导读配置（生成 Godot vs UE 概览式技术导读文章）
; ============================================================
[SourceGuide]
; Prompt 模板文件
prompt_file = Prompt/source_guide_prompt.md

; 输出目录（相对于 GodotBuddy 根目录）
output_dir = Reports/GodotEngine/4.6.2

; 输出文件名
output_filename = Godot_4.6.2_Source_Guide_for_UE_Developers.md

; knot-cli 执行指令模板
; 可用占位符: {prompt_file} {report_path} {source_dir} {ue_source_dir} {godotbuddy_dir} {model} {user_rules}
cli_args_template = chat -w "{source_dir}" -w "{ue_source_dir}" -w "{godotbuddy_dir}" --codebase --model "{model}" --user-rules "{user_rules}" -p "Read file {prompt_file} for the complete task instructions. Write the full technical guide article to: {report_path}"

; ============================================================
; 项目扫描配置
; ============================================================
[Scanner]
; 扫描时忽略的目录（逗号分隔）
ignore_dirs = .godot, .import, addons, build, export, android, ios

; 扫描的文件类型（逗号分隔）
scan_extensions = .gd, .tscn, .tres, .gdshader, .cfg, .import

; GDScript 文件最大行数限制（超过此行数的文件会被截断）
max_script_lines = 500

; 场景文件是否解析节点树
parse_scene_tree = true

; ============================================================
; 项目配置
; 每个项目一个独立的 section，格式为 [Project:项目名]
; ============================================================

[Project:ThirdPersonShooter-TPS-Demo]
; Godot 项目根目录（包含 project.godot 的目录）
project_dir = D:\Project\Godot\ThirdPersonShooter(tps)Demo
; Godot 引擎版本（留空则自动从 project.godot 检测）
engine_version =
; 项目描述（留空则自动从 project.godot 读取）
description =
; 分析重点（可选：architecture, performance, code_quality, security, all）
analysis_focus = all
